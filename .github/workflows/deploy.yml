name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Convert CSVs to JSON
        run: |
          python3 << 'EOF'
          import csv
          import json
          import os

          # Convert nodes.csv to nodes.json
          nodes = []
          with open('data/nodes.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  nodes.append({
                      'url': row['url'],
                      'owner': row['owner']
                  })

          with open('nodes.json', 'w') as f:
              json.dump({'nodes': nodes}, f, indent=2)

          # Convert addresses.csv to addresses.json
          addresses = []
          with open('data/addresses.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  addresses.append({
                      'address': row['address'],
                      'tag': row['tag']
                  })

          with open('addresses.json', 'w') as f:
              json.dump({'addresses': addresses}, f, indent=2)
          EOF

      - name: Setup Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit JSON files
        run: |
          git checkout --orphan gh-pages
          git rm -rf .
          git add nodes.json addresses.json
          git commit -m "Deploy JSON $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin gh-pages --force