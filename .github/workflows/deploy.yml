name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Convert CSVs to JSON
        run: |
          python3 << 'EOF'
          import csv
          import json

          # Convert legacy-nodes.csv to legacy-nodes.json
          legacy_nodes = []
          with open('data/legacy-nodes.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  legacy_nodes.append({
                      'url': row['url'],
                      'owner': row['owner']
                  })

          with open('legacy-nodes.json', 'w') as f:
              json.dump({'nodes': legacy_nodes}, f, indent=2)

          # Convert defi-nodes.csv to defi-nodes.json
          defi_nodes = []
          with open('data/defi-nodes.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  defi_nodes.append({
                      'url': row['url'],
                      'owner': row['owner']
                  })

          with open('defi-nodes.json', 'w') as f:
              json.dump({'nodes': defi_nodes}, f, indent=2)

          # Convert addresses.csv to addresses.json
          addresses = []
          with open('data/addresses.csv', 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  addresses.append({
                      'address': row['address'],
                      'tag': row['tag']
                  })

          with open('addresses.json', 'w') as f:
              json.dump({'addresses': addresses}, f, indent=2)
          EOF

      - name: Setup Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit JSON files
        run: |
          cp index.html /tmp/index.html
          cp CNAME /tmp/CNAME
          git checkout --orphan gh-pages
          git rm -rf .
          cp /tmp/index.html .
          cp /tmp/CNAME .
          git add index.html CNAME legacy-nodes.json defi-nodes.json addresses.json
          git commit -m "Deploy JSON $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push origin gh-pages --force